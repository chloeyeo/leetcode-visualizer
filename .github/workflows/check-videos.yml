name: Daily video health check

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch: {}   # allow manual runs

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify mapped videos still exist
        run: node scripts/check-videos.mjs
        env:
          CHECK_LIMIT: 500 # rotate through 500 oldest entries each run

      - name: Commit any status changes
        run: |
          if [[ -n "$(git status --porcelain public/videos.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/videos.json
            git commit -m "chore: refresh video health status"
            git push
          else
            echo "No changes."
          fi
